<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALSKILL — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="auth">
    <header class="global-header">
      <div class="global-brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <div>
          <strong>ALSKILL Platform</strong>
          <p>Alumni Skill Analytics System</p>
        </div>
      </div>
    </header>

    <main class="auth-page active">
      <section class="auth-shell">
        <aside class="auth-brand card fade-up">
          <p class="auth-badge">Alumni Skill Analytics</p>
          <h1>ALSKILL</h1>
          <p class="tagline">From Data to Direction</p>
          <p class="section-note">
            Sign in here. Alumni go to the main dashboard; administrators go to the analytics dashboard.
            Use <strong>Register</strong> if you need a new alumni account.
          </p>
          <div class="login-photo-wrap">
            <a
              href="https://drive.google.com/drive/folders/1-4hWPQS8pv8dxlUZgwrwJFnC7xamZkTt"
              target="_blank"
              rel="noopener noreferrer"
              title="Asset folder on Google Drive"
            >
              <img class="login-photo" src="img1.jpg" alt="Branding" />
            </a>
          </div>
        </aside>

        <article class="card auth-card fade-up">
          <div class="auth-switch">
            <button id="showLoginBtn" class="primary ripple" type="button">Login</button>
            <button id="showRegisterBtn" class="ghost ripple" type="button">Register</button>
          </div>

          <div id="loginPanel">
            <h3>Sign In</h3>
            <form id="loginForm" class="form">
              <label>Institutional Email or Student ID<input type="text" name="email" required /></label>
              <label>Password<input type="password" name="password" required /></label>
              <button type="submit" class="primary ripple">Continue</button>
            </form>
            <p id="loginStatus" class="status feedback"></p>
          </div>

          <div id="registerPanel" class="hidden">
            <h3>Create Alumni Account</h3>
            <form id="registerForm" class="form">
              <label>Full Name<input type="text" name="name" required /></label>
              <label>Institutional Email<input type="email" name="email" required /></label>
              <label>Password<input type="password" name="password" required /></label>
              <label>Course
                <select name="course" required>
                  <option value="">Select course</option>
                  <option>BSIT</option>
                  <option>BSBA - Marketing</option>
                  <option>BSED</option>
                  <option>BEED</option>
                  <option>BECED</option>
                </select>
              </label>
              <label>Major<input type="text" name="major" placeholder="Optional" /></label>
              <label>Batch<input type="number" name="batch" min="1990" max="2100" required /></label>
              <button type="submit" class="primary ripple">Create Account</button>
            </form>
            <p id="registerStatus" class="status feedback"></p>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
