<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALSKILL — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="admin">
    <header class="global-header">
      <div class="global-brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <div>
          <strong>ALSKILL Platform</strong>
          <p>Admin analytics</p>
        </div>
      </div>
    </header>

    <main class="container" style="margin-top: 58px; padding-top: 16px">
      <header class="topbar" style="position: relative; top: 0; margin-bottom: 16px">
        <div class="top-actions" style="margin-left: auto">
          <span id="sessionLabel" class="muted"></span>
          <button id="topLogoutBtn" class="ghost ripple" type="button">Logout</button>
        </div>
      </header>

      <section id="adminSection" class="panel active">
        <h2>Analytics</h2>
        <p class="section-note">Course and category insights with drill-down.</p>
        <div id="adminKpi" class="kpi-grid"></div>
        <div class="grid two">
          <article class="card">
            <h3>Course Performance</h3>
            <p class="muted">Click bars or chips for details.</p>
            <canvas id="courseChart" width="420" height="240"></canvas>
            <div id="courseList" class="click-list"></div>
          </article>
          <article class="card">
            <h3>Category Distribution</h3>
            <canvas id="categoryChart" width="420" height="240"></canvas>
            <div id="categoryList" class="click-list"></div>
          </article>
        </div>
        <article class="card">
          <h3>Alumni Performance Index</h3>
          <div id="rankingTableWrap" class="table-wrap skeleton"></div>
        </article>
      </section>
    </main>

    <div id="drillDownPanel" class="drill-panel" aria-hidden="true">
      <div class="drill-head">
        <h3 id="drillTitle">Detail View</h3>
        <button id="closeDrillBtn" class="ghost ripple" type="button">Close</button>
      </div>
      <div id="drillBody" class="drill-body"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
