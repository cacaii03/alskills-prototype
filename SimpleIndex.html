<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALSKILL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style><?!= include("StylesRaw"); ?></style>
  </head>
  <body>
    <header class="global-header">
      <div class="global-brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <div>
          <strong>ALSKILL</strong>
          <p>Simple Assessment Capture</p>
        </div>
      </div>
    </header>

    <main class="container" style="margin-top: 58px;">
      <section class="panel active">
        <div class="grid two">
          <article class="card">
            <h3>Alumni Profile</h3>
            <p class="section-note">Enter profile details, then submit the assessment to store responses in Google Sheets.</p>
            <form id="simpleProfileForm" class="form">
              <label>Full Name<input name="name" required /></label>
              <label>Email<input name="email" type="email" required /></label>
              <label>Course
                <select name="course" required>
                  <option value="">Select course</option>
                  <option>BSIT</option>
                  <option>BSBA - Marketing</option>
                  <option>BSED</option>
                  <option>BEED</option>
                  <option>BECED</option>
                </select>
              </label>
              <label>Major<input name="major" placeholder="Optional" /></label>
              <label>Batch<input name="batch" type="number" min="1990" max="2100" required /></label>
            </form>
          </article>

          <article class="card">
            <h3>Questionnaire</h3>
            <div class="inline-controls">
              <label>Course
                <select id="simpleCourseSelect">
                  <option>BSIT</option>
                  <option>BSBA - Marketing</option>
                  <option>BSED</option>
                  <option>BEED</option>
                  <option>BECED</option>
                </select>
              </label>
              <button id="simpleLoadBtn" class="ghost ripple" type="button">Load Questions</button>
            </div>
            <form id="simpleQuestionsForm" class="form"></form>
            <button id="simpleSubmitBtn" class="primary ripple" type="button">Submit to Google Sheets</button>
            <p id="simpleStatus" class="status feedback"></p>
          </article>
        </div>
      </section>
    </main>

    <script><?!= include("SimpleClient"); ?></script>
  </body>
</html>
