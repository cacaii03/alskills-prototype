<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Brain Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0e10;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 760px;
    height: 600px;
  }

  .glow-teal {
    position: absolute;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(32,210,160,0.13) 0%, transparent 70%);
    top: 60px; left: 30px;
    border-radius: 50%;
    animation: floatA 7s ease-in-out infinite alternate;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .glow-amber {
    position: absolute;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(244,167,40,0.12) 0%, transparent 70%);
    top: 60px; right: 30px;
    border-radius: 50%;
    animation: floatB 9s ease-in-out infinite alternate;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .scene.hover-hard .glow-teal  { opacity: 2.5; }
  .scene.hover-soft .glow-amber { opacity: 2.5; }

  @keyframes floatA { from{transform:translate(0,0)} to{transform:translate(10px,18px)} }
  @keyframes floatB { from{transform:translate(0,0)} to{transform:translate(-14px,10px)} }

  svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  .pill {
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    cursor: pointer;
  }
  .pill.visible { opacity: 1; }

  .pill rect  { transition: fill 0.25s, stroke 0.25s, filter 0.25s; }
  .pill text  { transition: fill 0.25s; pointer-events: none; }
  .pill circle{ transition: r 0.25s, opacity 0.25s; }
  .pill line  { transition: stroke 0.25s, stroke-width 0.25s; }

  .pill.active-hard rect {
    fill: rgba(32,210,160,0.28) !important;
    stroke: rgba(32,210,160,1) !important;
    filter: drop-shadow(0 0 10px rgba(32,210,160,0.65));
  }
  .pill.active-hard text  { fill: #ffffff !important; }
  .pill.active-hard line  { stroke: rgba(32,210,160,0.95) !important; stroke-width: 2px !important; }

  .pill.active-soft rect {
    fill: rgba(244,167,40,0.28) !important;
    stroke: rgba(244,167,40,1) !important;
    filter: drop-shadow(0 0 10px rgba(244,167,40,0.65));
  }
  .pill.active-soft text  { fill: #ffffff !important; }
  .pill.active-soft line  { stroke: rgba(244,167,40,0.95) !important; stroke-width: 2px !important; }

  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.012); }
  }
  .brain-group {
    transform-origin: 380px 300px;
    animation: breathe 5s ease-in-out infinite;
  }

  #lobe-left, #lobe-right {
    transition: filter 0.35s, opacity 0.35s;
  }
  .scene.hover-hard #lobe-left  { filter: drop-shadow(0 0 22px rgba(32,210,160,0.6)) brightness(1.18); }
  .scene.hover-soft #lobe-right { filter: drop-shadow(0 0 22px rgba(244,167,40,0.6)) brightness(1.18); }
  .scene.hover-hard #lobe-right { opacity: 0.45; }
  .scene.hover-soft #lobe-left  { opacity: 0.45; }

  @keyframes fadeLabel {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .label-hard  { animation: fadeLabel 0.8s ease forwards 1.2s; opacity: 0; }
  .label-soft  { animation: fadeLabel 0.8s ease forwards 1.4s; opacity: 0; }
  .label-title { animation: fadeLabel 0.9s ease forwards 0.3s; opacity: 0; }

  @keyframes ripple {
    from { r: 4;  opacity: 0.9; stroke-width: 2; }
    to   { r: 32; opacity: 0;   stroke-width: 0.5; }
  }
  .ripple-circle { animation: ripple 0.6s ease-out forwards; }

  #tooltip {
    position: absolute;
    background: rgba(20,22,26,0.97);
    border: 1px solid rgba(255,255,255,0.13);
    color: rgba(255,255,255,0.85);
    font-size: 11.5px;
    padding: 7px 13px;
    border-radius: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    white-space: nowrap;
    letter-spacing: 0.3px;
    line-height: 1.5;
    z-index: 10;
  }
  #tooltip.show { opacity: 1; }

  @keyframes scanH {
    from { transform: translateY(0px);   opacity: 0.22; }
    to   { transform: translateY(310px); opacity: 0; }
  }
  .scan { animation: scanH 1.5s linear infinite; }
</style>
</head>

  </svg>
</div>

<script>
  const scene   = document.getElementById('scene');
  const tooltip = document.getElementById('tooltip');
  const scanL   = document.getElementById('scan-left');
  const scanR   = document.getElementById('scan-right');
  const hoverL  = document.getElementById('hover-left');
  const hoverR  = document.getElementById('hover-right');
  const rl      = document.getElementById('ripple-layer');
  const svg     = document.getElementById('main-svg');

  const hardPills = document.querySelectorAll('.hard-pill');
  const softPills = document.querySelectorAll('.soft-pill');
  const allPills  = [...hardPills, ...softPills];

  // ── Staggered entrance ──
  hardPills.forEach((el, i) => {
    el.style.transform = 'translateX(-20px)';
    setTimeout(() => { el.style.transform = 'translateX(0)'; el.classList.add('visible'); }, 800 + i * 200);
  });
  softPills.forEach((el, i) => {
    el.style.transform = 'translateX(20px)';
    setTimeout(() => { el.style.transform = 'translateX(0)'; el.classList.add('visible'); }, 900 + i * 160);
  });

  // ── Helpers ──
  function activateSide(side) {
    scene.classList.add(side === 'hard' ? 'hover-hard' : 'hover-soft');
    (side === 'hard' ? scanL : scanR).style.opacity = '1';
    (side === 'hard' ? hardPills : softPills).forEach(p => p.classList.add(side === 'hard' ? 'active-hard' : 'active-soft'));
  }
  function deactivateSide(side) {
    scene.classList.remove(side === 'hard' ? 'hover-hard' : 'hover-soft');
    (side === 'hard' ? scanL : scanR).style.opacity = '0';
    (side === 'hard' ? hardPills : softPills).forEach(p => p.classList.remove(side === 'hard' ? 'active-hard' : 'active-soft'));
  }
  function dimOthers(except) {
    allPills.forEach(p => { if (p !== except) p.style.opacity = '0.35'; });
  }
  function undimAll() {
    allPills.forEach(p => { p.style.opacity = '1'; });
  }

  // ── Brain half hover ──
  hoverL.addEventListener('mouseenter', () => activateSide('hard'));
  hoverL.addEventListener('mouseleave', () => deactivateSide('hard'));
  hoverR.addEventListener('mouseenter', () => activateSide('soft'));
  hoverR.addEventListener('mouseleave', () => deactivateSide('soft'));

  // ── Pill hover & tooltip ──
  allPills.forEach(pill => {
    const isHard = pill.classList.contains('hard-pill');
    const ac = isHard ? 'active-hard' : 'active-soft';
    const sc = isHard ? 'hover-hard' : 'hover-soft';
    const scanEl = isHard ? scanL : scanR;

    pill.addEventListener('mouseenter', () => {
      isHovered = true;
      pill.classList.add(ac);
      scene.classList.add(sc);
      scanEl.style.opacity = '1';
      dimOthers(pill);
      const tip = pill.getAttribute('data-tip');
      if (tip) { tooltip.textContent = tip; tooltip.classList.add('show'); }
    });

    pill.addEventListener('mousemove', e => {
      const r = scene.getBoundingClientRect();
      let x = e.clientX - r.left + 14;
      let y = e.clientY - r.top  - 40;
      if (x + 190 > r.width) x = e.clientX - r.left - 190;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    });

    pill.addEventListener('mouseleave', () => {
      isHovered = false;
      pill.classList.remove(ac);
      scene.classList.remove(sc);
      scanEl.style.opacity = '0';
      undimAll();
      tooltip.classList.remove('show');
    });

    // Click ripple
    pill.addEventListener('click', e => {
      const r = svg.getBoundingClientRect();
      const cx = (e.clientX - r.left) * (760 / r.width);
      const cy = (e.clientY - r.top)  * (600 / r.height);
      const color = isHard ? 'rgba(32,210,160,0.7)' : 'rgba(244,167,40,0.7)';
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', '4');
      c.setAttribute('fill', 'none'); c.setAttribute('stroke', color); c.setAttribute('stroke-width', '2');
      c.classList.add('ripple-circle');
      rl.appendChild(c);
      setTimeout(() => c.remove(), 650);
    });
  });

  // ── Auto-cycle idle highlight ──
  let cycleIdx = 0, cycleTimer = null, isHovered = false;

  scene.addEventListener('mouseenter', () => { isHovered = true;  clearInterval(cycleTimer); clearAllHighlights(); });
  scene.addEventListener('mouseleave', () => { isHovered = false; startCycle(); });

  function clearAllHighlights() {
    scene.classList.remove('hover-hard','hover-soft');
    scanL.style.opacity = '0'; scanR.style.opacity = '0';
    allPills.forEach(p => { p.classList.remove('active-hard','active-soft'); p.style.opacity = '1'; });
  }

  function startCycle() {
    cycleTimer = setInterval(() => {
      if (isHovered) return;
      clearAllHighlights();
      const p = allPills[cycleIdx % allPills.length];
      const isH = p.classList.contains('hard-pill');
      p.classList.add(isH ? 'active-hard' : 'active-soft');
      scene.classList.add(isH ? 'hover-hard' : 'hover-soft');
      (isH ? scanL : scanR).style.opacity = '0.5';
      dimOthers(p);
      cycleIdx++;
    }, 1800);
  }

  setTimeout(startCycle, 2800);
</script>

</body>
</html>
