<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALSKILL — Assessment results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="results">
    <header class="results-print-header no-print">
      <div class="results-print-header__inner">
        <a id="resultsBackLink" class="results-back-link" href="#">← Back</a>
        <div class="results-print-header__actions">
          <span id="resultsSessionLabel" class="results-session muted"></span>
          <button id="resultsPrintBtn" type="button" class="primary ripple">Print results</button>
          <button id="topLogoutBtn" class="ghost ripple" type="button">Sign out</button>
        </div>
      </div>
    </header>

    <main class="results-print-shell">
      <div id="resultsRoot" class="results-print-root" aria-live="polite">
        <p class="muted">Loading results…</p>
      </div>
    </main>

    <script src="assessment-catalog.js"></script>
    <script src="app.js"></script>
  </body>
</html>
